<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Filmes & Séries</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --accent: #e85d9f;
      --accent2: #9b5de5;
      --text: #f0f0f0;
      --text-muted: #888;
      --watched: #2a2a38;
      --border: #2e2e42;
      --success: #4caf82;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo span {
      font-size: 13px;
      -webkit-text-fill-color: var(--text-muted);
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 4px;
    }

    .stats {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      gap: 6px;
    }

    .tab {
      flex: 1;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-color: transparent;
      color: white;
    }

    main {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 60px 20px;
      color: var(--text-muted);
      text-align: center;
    }

    .empty-icon {
      font-size: 48px;
    }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      line-height: 1.5;
    }

    /* Card — layout refeito para suportar banner */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: opacity 0.2s;
    }

    .card.watched {
      background: var(--watched);
      opacity: 0.75;
    }

    .card.watched .titulo {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Banner de imagem do filme/série */
    .card-banner {
      position: relative;
      height: 130px;
      overflow: hidden;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .card-banner.banner-loaded {
      background: none;
      animation: none;
    }

    .card-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card-banner img.img-loaded {
      opacity: 1;
    }

    .card-banner-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: linear-gradient(to bottom, transparent, var(--surface));
    }

    .card.watched .card-banner-fade {
      background: linear-gradient(to bottom, transparent, var(--watched));
    }

    /* Conteúdo principal do card */
    .card-main {
      padding: 12px 16px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .card-banner + .card-main {
      padding-top: 8px;
    }

    .check-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      margin-top: 2px;
    }

    .check-btn.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .check-icon {
      width: 12px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .check-btn.checked .check-icon {
      opacity: 1;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .titulo {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      transition: all 0.2s;
    }

    .badges {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
      align-items: center;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-filme {
      background: #1e3a5f;
      color: #6ab0f5;
    }

    .badge-serie {
      background: #3d1a5f;
      color: #c084fc;
    }

    .badge-watched {
      background: #1a3d2b;
      color: var(--success);
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
    }

    .nota {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 5px;
      line-height: 1.4;
    }

    .previsao {
      font-size: 12px;
      color: #7ec8e3;
      margin-top: 5px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .data {
      font-size: 11px;
      color: var(--text-muted);
    }

    .delete-btn, .edit-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 16px;
      line-height: 1;
      opacity: 0.5;
      transition: all 0.15s;
    }

    .delete-btn:hover {
      opacity: 1;
      color: #e05;
    }

    .edit-btn:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      color: white;
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(232, 93, 159, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      z-index: 200;
    }

    .fab:active {
      transform: scale(0.92);
    }

    /* Modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 300;
      align-items: flex-end;
    }

    .overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface2);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      animation: slideUp 0.25s ease;
      max-height: 90dvh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }

      to {
        transform: translateY(0);
      }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input[type="text"],
    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      resize: none;
    }

    input[type="text"]:focus,
    textarea:focus,
    input[type="date"]:focus {
      border-color: var(--accent);
    }

    input[type="date"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
      color-scheme: dark;
    }

    .tipo-group {
      display: flex;
      gap: 8px;
    }

    .tipo-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tipo-btn.active {
      border-color: var(--accent);
      background: rgba(232, 93, 159, 0.1);
      color: var(--accent);
    }

    .btn-add {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .btn-add:active {
      opacity: 0.85;
    }

    .btn-add:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-cancel {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 400;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .drag-handle {
      color: var(--text-muted);
      cursor: grab;
      padding: 4px 2px;
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0.4;
      user-select: none;
      line-height: 1;
      margin-top: 4px;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .card.sortable-ghost {
      opacity: 0.3;
    }

    .card.sortable-chosen {
      box-shadow: 0 4px 20px rgba(232, 93, 159, 0.3);
    }

    /* Hero section */
    .hero {
      position: relative;
      height: 230px;
      overflow: hidden;
      display: flex;
      flex-shrink: 0;
    }

    .hero-photos {
      display: flex;
      width: 100%;
      height: 100%;
      gap: 2px;
    }

    .hero-photo {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .hero-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: blur(1px);
      transform: scale(1.04);
    }

    .hero-photo:nth-child(1) img {
      object-position: center 30%;
    }

    .hero-photo:nth-child(2) img {
      object-position: center 15%;
    }

    .hero-photo:nth-child(3) img {
      object-position: center 20%;
    }

    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(15, 15, 19, 0.1) 0%,
          rgba(15, 15, 19, 0.15) 40%,
          rgba(15, 15, 19, 0.7) 75%,
          rgba(15, 15, 19, 1) 100%);
      pointer-events: none;
    }

    .hero-side-fade-left {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to right, rgba(15, 15, 19, 0.5), transparent);
      pointer-events: none;
    }

    .hero-side-fade-right {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 40px;
      background: linear-gradient(to left, rgba(15, 15, 19, 0.5), transparent);
      pointer-events: none;
    }

    .hero-content {
      position: absolute;
      bottom: 14px;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 20px;
    }

    .hero-tagline {
      font-size: 13px;
      color: rgba(240, 240, 240, 0.75);
      letter-spacing: 0.3px;
    }

    .hero-hearts {
      font-size: 18px;
      letter-spacing: 6px;
      margin-bottom: 4px;
      opacity: 0.9;
    }

    /* TMDB autocomplete */
    .tmdb-suggestions {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-top: 6px;
      overflow: hidden;
    }

    .tmdb-result {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.1s;
      border-bottom: 1px solid var(--border);
    }

    .tmdb-result:last-child {
      border-bottom: none;
    }

    .tmdb-result:active {
      background: var(--surface);
    }

    .tmdb-result-poster {
      width: 34px;
      height: 51px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border);
    }

    .tmdb-result-poster-placeholder {
      width: 34px;
      height: 51px;
      border-radius: 4px;
      flex-shrink: 0;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .tmdb-result-info {
      flex: 1;
      min-width: 0;
    }

    .tmdb-result-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }

    .tmdb-result-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* Preview do item selecionado do TMDB */
    .tmdb-preview {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(155, 93, 229, 0.08);
      border: 1px solid rgba(155, 93, 229, 0.3);
      border-radius: 10px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .tmdb-preview img {
      width: 38px;
      height: 57px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .tmdb-preview-info {
      flex: 1;
      min-width: 0;
    }

    .tmdb-preview-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tmdb-preview-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .tmdb-preview-clear {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    .tmdb-searching {
      display: none;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      padding: 0 2px;
      align-items: center;
    }

    /* ---- Loading States ---- */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* Inline spinner (TMDB search) */
    .inline-spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 1.5px solid rgba(136, 136, 136, 0.25);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
      flex-shrink: 0;
    }

    /* Button spinner */
    .btn-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 7px;
    }

    /* Check button spinner */
    .check-spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }

    /* Skeleton cards (page load) */
    .card-skeleton {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-skeleton-banner {
      height: 130px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .card-skeleton-body {
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .card-skeleton-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .card-skeleton-lines {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 3px;
    }

    .card-skeleton-line {
      height: 13px;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .card-skeleton-line:nth-child(1) { width: 62%; }
    .card-skeleton-line:nth-child(2) { width: 38%; }
    .card-skeleton-line:nth-child(3) { width: 48%; margin-top: 2px; }

    /* ---- Vista detalhe (full-screen) ---- */
    .card {
      cursor: pointer;
    }

    body.detail-open .fab {
      display: none;
    }

    .detail-view {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 250;
      background: var(--bg);
      flex-direction: column;
    }

    .detail-view.open {
      display: flex;
    }

    /* Cabeçalho da vista detalhe: mesma linguagem visual do header principal */
    .detail-header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      position: relative;
      z-index: 101;
    }

    .detail-header .header-top {
      margin-bottom: 0;
    }

    .detail-back {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 8px 12px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .detail-back:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .detail-back:active {
      opacity: 0.85;
    }

    .detail-toolbar-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .detail-icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 8px 10px;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .detail-icon-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .detail-icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      border-color: var(--border);
    }

    .detail-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .detail-hero-wrap {
      position: relative;
      min-height: 200px;
    }

    .detail-hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center top;
      filter: saturate(1.05);
    }

    .detail-hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(15, 15, 19, 0.25) 0%,
          rgba(15, 15, 19, 0.85) 55%,
          var(--bg) 100%);
    }

    .detail-hero-bg:not([style*="background-image"]) {
      background: linear-gradient(145deg, var(--surface2), var(--surface));
    }

    .detail-hero-content {
      position: relative;
      padding: 20px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .detail-poster-wrap {
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
      flex-shrink: 0;
    }

    .detail-poster {
      display: block;
      width: min(200px, 42vw);
      height: auto;
    }

    .detail-poster-placeholder {
      width: min(200px, 42vw);
      aspect-ratio: 2/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .detail-title-block {
      text-align: center;
      width: 100%;
    }

    .detail-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .detail-body {
      padding: 0 20px 48px;
      max-width: 560px;
      margin: 0 auto;
    }

    .detail-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin: 22px 0 10px;
    }

    .detail-meta {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-meta-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      align-items: baseline;
    }

    .detail-meta-label {
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .detail-meta-value {
      text-align: right;
      word-break: break-word;
    }

    .detail-meta-row--status {
      align-items: center;
    }

    .detail-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.03em;
      line-height: 1;
      border: 1px solid transparent;
      flex-shrink: 0;
    }

    .detail-status-pill::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .detail-status-pill--sim {
      background: linear-gradient(145deg, rgba(76, 175, 130, 0.22), rgba(76, 175, 130, 0.1));
      color: #a8e8c8;
      border-color: rgba(76, 175, 130, 0.42);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2);
    }

    .detail-status-pill--sim::before {
      background: var(--success);
      box-shadow: 0 0 10px rgba(76, 175, 130, 0.55);
    }

    .detail-status-pill--nao {
      background: linear-gradient(145deg, rgba(100, 100, 120, 0.2), rgba(80, 80, 95, 0.08));
      color: #b0b0c0;
      border-color: var(--border);
    }

    .detail-status-pill--nao::before {
      background: var(--surface2);
      border: 2px solid var(--text-muted);
      box-sizing: border-box;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
    }

    .detail-nota {
      font-size: 15px;
      line-height: 1.55;
      color: var(--text-muted);
      white-space: pre-wrap;
    }

    .detail-meta-added {
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .detail-meta-added .detail-meta-row {
      font-size: 11px;
    }

    .detail-meta-added .detail-meta-label,
    .detail-meta-added .detail-meta-value {
      color: var(--text-muted);
      opacity: 0.85;
    }

    .detail-meta-obs {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: stretch;
    }

    .detail-meta-obs .detail-meta-label {
      align-self: flex-start;
    }

    .detail-meta-obs .detail-nota {
      margin: 0;
    }

    .detail-assistido-row {
      margin: 24px 0 8px;
    }

    .detail-check-large {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }

    .detail-check-large.checked {
      background: rgba(76, 175, 130, 0.18);
      border-color: var(--success);
      color: #b8f0d3;
    }

    .detail-check-large:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    .detail-check-large.checked:disabled {
      opacity: 1;
      cursor: default;
    }

    .detail-btn-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(128, 128, 128, 0.35);
      border-top-color: var(--text-muted);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .gallery-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .gallery-btn {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .gallery-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (min-width: 480px) {
      .gallery-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface2);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .gallery-item-delete {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .gallery-item-delete:disabled {
      opacity: 0.4;
    }

    .gallery-item-loading {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
      border: 1px dashed var(--border);
      border-radius: 12px;
    }

    .detail-skeleton-hero {
      height: 220px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    .detail-skeleton-body {
      padding: 24px 20px;
      max-width: 560px;
      margin: 0 auto;
    }

    .detail-error {
      padding: 40px 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .detail-error button {
      margin-top: 16px;
    }

    /* Lightbox */
    .photo-lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .photo-lightbox.open {
      display: flex;
    }

    .photo-lightbox img {
      max-width: 100%;
      max-height: 92dvh;
      object-fit: contain;
      border-radius: 8px;
    }

    .photo-lightbox-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-top">
      <div>
        <div class="logo">🎬 Nossa Lista <span>❤️</span></div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="tabs">
      <button class="tab active" data-filtro="pendentes">Para ver</button>
      <button class="tab" data-filtro="todos">Todos</button>
      <button class="tab" data-filtro="assistidos">Assistidos</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-photos">
      <div class="hero-photo"><img src="/images/2.jpeg" alt="Nós"></div>
      <div class="hero-photo"><img src="/images/3.jpeg" alt="Nós"></div>
      <div class="hero-photo"><img src="/images/1.jpeg" alt="Nós"></div>
    </div>
    <div class="hero-gradient"></div>
    <div class="hero-side-fade-left"></div>
    <div class="hero-side-fade-right"></div>
    <div class="hero-content">
      <div class="hero-hearts">🎬 ❤️ 🍿</div>
      <div class="hero-tagline">filmes & séries para assistir juntos</div>
    </div>
  </section>

  <main id="lista"></main>

  <div id="detail-view" class="detail-view" aria-hidden="true">
    <header class="detail-header">
      <div class="header-top">
        <button type="button" class="detail-back" id="detail-back" aria-label="Voltar">← Voltar</button>
        <div class="detail-toolbar-actions">
          <button type="button" class="detail-icon-btn" id="detail-btn-edit" title="Editar" aria-label="Editar">✏️</button>
          <button type="button" class="detail-icon-btn" id="detail-btn-delete" title="Remover" aria-label="Remover">🗑</button>
        </div>
      </div>
    </header>
    <div class="detail-scroll" id="detail-scroll">
      <div id="detail-inner"></div>
    </div>
  </div>

  <div id="photo-lightbox" class="photo-lightbox" aria-hidden="true">
    <button type="button" class="photo-lightbox-close" id="photo-lightbox-close" aria-label="Fechar">✕</button>
    <img id="photo-lightbox-img" src="" alt="">
  </div>

  <input type="file" id="input-foto-camera" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,image/*" capture="environment" hidden>
  <input type="file" id="input-foto-galeria" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,image/*" hidden>

  <button class="fab" id="fab-btn">+</button>

  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-title">Adicionar à lista</div>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="input-titulo" placeholder="Nome do filme ou série..." autocomplete="off">
        <div class="tmdb-searching" id="tmdb-searching"><span class="inline-spinner"></span>Buscando na TMDB...</div>
        <div class="tmdb-suggestions" id="tmdb-suggestions"></div>
        <div class="tmdb-preview" id="tmdb-preview">
          <img id="tmdb-preview-img" src="" alt="">
          <div class="tmdb-preview-info">
            <div class="tmdb-preview-title" id="tmdb-preview-title"></div>
            <div class="tmdb-preview-meta" id="tmdb-preview-meta"></div>
          </div>
          <button class="tmdb-preview-clear" id="tmdb-preview-clear">✕</button>
        </div>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <div class="tipo-group">
          <button class="tipo-btn active" data-tipo="filme">🎬 Filme</button>
          <button class="tipo-btn" data-tipo="serie">📺 Série</button>
        </div>
      </div>
      <div class="form-group">
        <label>Previsão para assistir <span style="font-weight:400">(opcional)</span></label>
        <input type="date" id="input-previsao">
      </div>
      <div class="form-group">
        <label>Observação <span style="font-weight:400">(opcional)</span></label>
        <textarea id="input-nota" placeholder="Ex: recomendado pelo Pedro, disponível na Netflix..."
          rows="2"></textarea>
      </div>
      <button class="btn-add" id="btn-add">Adicionar</button>
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
    </div>
  </div>

  <div class="overlay" id="overlay-edicao">
    <div class="modal">
      <div class="modal-title">Editar item</div>
      <div class="form-group">
        <label>Título</label>
        <input type="text" id="edit-titulo" disabled style="opacity:0.45;cursor:not-allowed">
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <div class="tipo-group">
          <button class="tipo-btn" id="edit-tipo-filme" data-tipo="filme" disabled style="cursor:not-allowed;opacity:0.45">🎬 Filme</button>
          <button class="tipo-btn" id="edit-tipo-serie" data-tipo="serie" disabled style="cursor:not-allowed;opacity:0.45">📺 Série</button>
        </div>
      </div>
      <div class="form-group">
        <label>Previsão para assistir <span style="font-weight:400">(opcional)</span></label>
        <input type="date" id="edit-previsao">
      </div>
      <div class="form-group">
        <label>Observação <span style="font-weight:400">(opcional)</span></label>
        <textarea id="edit-nota" placeholder="Ex: recomendado pelo Pedro, disponível na Netflix..." rows="2"></textarea>
      </div>
      <button class="btn-add" id="btn-salvar-edicao">Salvar</button>
      <button class="btn-cancel" id="btn-cancelar-edicao">Cancelar</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const TMDB_IMG = 'https://image.tmdb.org/t/p';

    let filmes = [];
    let filtro = 'pendentes';
    let tipoSelecionado = 'filme';
    let sortable = null;
    let tmdbSelecionado = null;
    let searchTimer = null;
    let tituloAntesDaSeleção = '';

    const lista = document.getElementById('lista');
    const stats = document.getElementById('stats');
    const detailView = document.getElementById('detail-view');
    const detailInner = document.getElementById('detail-inner');
    const detailBack = document.getElementById('detail-back');
    const detailBtnEdit = document.getElementById('detail-btn-edit');
    const detailBtnDelete = document.getElementById('detail-btn-delete');
    const inputFotoCamera = document.getElementById('input-foto-camera');
    const inputFotoGaleria = document.getElementById('input-foto-galeria');
    const photoLightbox = document.getElementById('photo-lightbox');
    const photoLightboxImg = document.getElementById('photo-lightbox-img');
    const photoLightboxClose = document.getElementById('photo-lightbox-close');

    let detalheFilmeId = null;
    let uploadEmProgresso = false;
    const overlay = document.getElementById('overlay');
    const inputTitulo = document.getElementById('input-titulo');
    const inputNota = document.getElementById('input-nota');
    const elSuggestions = document.getElementById('tmdb-suggestions');
    const elPreview = document.getElementById('tmdb-preview');
    const elSearching = document.getElementById('tmdb-searching');

    function skeletonCard(withBanner) {
      return `<div class="card-skeleton">
        ${withBanner ? '<div class="card-skeleton-banner"></div>' : ''}
        <div class="card-skeleton-body">
          <div class="card-skeleton-circle"></div>
          <div class="card-skeleton-lines">
            <div class="card-skeleton-line"></div>
            <div class="card-skeleton-line"></div>
            <div class="card-skeleton-line"></div>
          </div>
        </div>
      </div>`;
    }

    function detailSkeletonHtml() {
      return `<div class="detail-skeleton-hero"></div>
        <div class="detail-skeleton-body">
          <div class="card-skeleton-line" style="width:70%;height:20px;margin-bottom:16px"></div>
          <div class="card-skeleton-line" style="width:100%"></div>
          <div class="card-skeleton-line" style="width:90%"></div>
          <div class="card-skeleton-line" style="width:60%"></div>
        </div>`;
    }

    function abrirPainelDetalhe() {
      detailView.classList.add('open');
      detailView.setAttribute('aria-hidden', 'false');
      document.body.classList.add('detail-open');
      document.body.style.overflow = 'hidden';
    }

    function fecharPainelDetalhe() {
      detailView.classList.remove('open');
      detailView.setAttribute('aria-hidden', 'true');
      document.body.classList.remove('detail-open');
      document.body.style.overflow = '';
      detailInner.innerHTML = '';
    }

    function aplicarRotaHash() {
      const m = (location.hash || '').match(/^#\/filme\/([^/]+)$/);
      if (m) {
        detalheFilmeId = m[1];
        abrirPainelDetalhe();
        carregarDetalhe(m[1]);
      } else {
        detalheFilmeId = null;
        fecharPainelDetalhe();
      }
    }

    async function carregarDetalhe(id) {
      detailInner.innerHTML = detailSkeletonHtml();
      detailBtnEdit.disabled = true;
      detailBtnDelete.disabled = true;
      try {
        const res = await fetch(`/api/filmes/${encodeURIComponent(id)}`);
        if (!res.ok) throw new Error('nf');
        const f = await res.json();
        filmes = filmes.map(x => x.id === f.id ? f : x);
        renderizarDetalhe(f);
        detailBtnEdit.disabled = f.assistido;
        detailBtnDelete.disabled = false;
      } catch {
        detailInner.innerHTML = `<div class="detail-error">
          <div>Não foi possível carregar este item.</div>
          <button type="button" class="btn-cancel" onclick="location.hash=''">Voltar</button>
        </div>`;
      }
    }

    function setBotoesGaleria(desativar) {
      document.querySelectorAll('.gallery-btn').forEach(b => { b.disabled = desativar; });
    }

    function renderizarDetalhe(f) {
      const fotos = f.fotos || [];
      const backdrop = f.backdrop_path ? `${TMDB_IMG}/w780${f.backdrop_path}` : '';
      const poster = f.poster_path ? `${TMDB_IMG}/w342${f.poster_path}` : '';
      const maxFotos = 40;
      const galeriaCheia = fotos.length >= maxFotos;
      const notaTrim = f.nota && String(f.nota).trim();
      const notaBlock = notaTrim
        ? `<div class="detail-meta-obs">
            <span class="detail-meta-label">Observação</span>
            <p class="detail-nota">${escapeHtml(notaTrim)}</p>
          </div>`
        : '';

      const metaHtml = `
        <div class="detail-section-title">Informações</div>
        <div class="detail-meta">
          <div class="detail-meta-row detail-meta-row--status">
            <span class="detail-meta-label">Assistido</span>
            <span class="detail-meta-value detail-status-pill ${f.assistido ? 'detail-status-pill--sim' : 'detail-status-pill--nao'}" role="status">${f.assistido ? 'Sim' : 'Não'}</span>
          </div>
          ${f.assistido && f.assistidoEm ? `<div class="detail-meta-row">
            <span class="detail-meta-label">Assistido em</span>
            <span class="detail-meta-value">${formatarData(f.assistidoEm)}</span>
          </div>` : ''}
          ${f.previsaoEm ? `<div class="detail-meta-row">
            <span class="detail-meta-label">Previsão</span>
            <span class="detail-meta-value">${formatarDataLocal(f.previsaoEm)}</span>
          </div>` : ''}
          ${notaBlock}
          <div class="detail-meta-added">
            <div class="detail-meta-row">
              <span class="detail-meta-label">Adicionado</span>
              <span class="detail-meta-value">${formatarData(f.adicionadoEm)}</span>
            </div>
          </div>
        </div>`;

      const fotosGrid = fotos.length
        ? `<div class="gallery-grid">
            ${fotos.map(p => `<div class="gallery-item">
              <img src="${String(p.url).replace(/"/g, '&quot;')}" loading="lazy" decoding="async" alt="">
              <button type="button" class="gallery-item-delete" data-foto-id="${escapeHtml(p.id)}" aria-label="Remover foto">✕</button>
            </div>`).join('')}
          </div>`
        : `<div class="gallery-empty">Ainda não há fotos deste momento. Adiciona uma pela câmara ou galeria.</div>`;

      detailInner.innerHTML = `
        <div class="detail-hero-wrap">
          <div class="detail-hero-bg" ${backdrop ? `style="background-image:url('${backdrop.replace(/'/g, "\\'")}')"` : ''}></div>
          <div class="detail-hero-content">
            <div class="detail-poster-wrap">
              ${poster
          ? `<img class="detail-poster" src="${poster.replace(/'/g, "\\'")}" alt="" width="342" height="513" loading="eager" decoding="async">`
          : '<div class="detail-poster-placeholder">🎬</div>'}
            </div>
            <div class="detail-title-block">
              <h1 class="detail-title">${escapeHtml(f.titulo)}</h1>
              <span class="badge badge-${f.tipo}">${f.tipo === 'filme' ? '🎬' : '📺'} ${f.tipo}</span>
            </div>
          </div>
        </div>
        <div class="detail-body">
          ${metaHtml}
          <div class="detail-assistido-row">
            <button type="button" class="detail-check-large ${f.assistido ? 'checked' : ''}" id="detail-check-assistido" ${f.assistido ? 'disabled aria-label="Assistido"' : ''}>
              ${f.assistido ? '✅ Assistido' : 'Marcar como assistido'}
            </button>
          </div>
          <div class="detail-section-title">Momentos juntos</div>
          <div class="gallery-actions">
            <button type="button" class="gallery-btn" id="gallery-btn-camera" ${galeriaCheia ? 'disabled' : ''}>📷 Tirar foto</button>
            <button type="button" class="gallery-btn" id="gallery-btn-galeria" ${galeriaCheia ? 'disabled' : ''}>🖼 Da galeria</button>
          </div>
          ${galeriaCheia ? '<p style="font-size:12px;color:var(--text-muted);margin:0 0 12px">Limite de ' + maxFotos + ' fotos atingido.</p>' : ''}
          ${fotosGrid}
        </div>`;

      detailBtnEdit.disabled = f.assistido;
    }

    async function enviarFotoFicheiro(file) {
      if (!file || !detalheFilmeId || uploadEmProgresso) return;
      uploadEmProgresso = true;
      setBotoesGaleria(true);
      try {
        const fd = new FormData();
        fd.append('foto', file);
        const res = await fetch(`/api/filmes/${encodeURIComponent(detalheFilmeId)}/fotos`, { method: 'POST', body: fd });
        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          mostrarToast(errData.error || 'Erro ao enviar foto');
          return;
        }
        const res2 = await fetch(`/api/filmes/${encodeURIComponent(detalheFilmeId)}`);
        const fresh = await res2.json();
        filmes = filmes.map(x => x.id === fresh.id ? fresh : x);
        renderizarDetalhe(fresh);
        mostrarToast('📷 Foto adicionada');
      } catch {
        mostrarToast('Erro ao enviar foto');
      } finally {
        uploadEmProgresso = false;
        setBotoesGaleria(false);
        inputFotoCamera.value = '';
        inputFotoGaleria.value = '';
      }
    }

    async function removerFoto(fotoId) {
      if (!detalheFilmeId || !confirm('Remover esta foto?')) return;
      const res = await fetch(`/api/filmes/${encodeURIComponent(detalheFilmeId)}/fotos/${encodeURIComponent(fotoId)}`, { method: 'DELETE' });
      if (!res.ok) {
        mostrarToast('Erro ao remover foto');
        return;
      }
      const res2 = await fetch(`/api/filmes/${encodeURIComponent(detalheFilmeId)}`);
      const fresh = await res2.json();
      filmes = filmes.map(x => x.id === fresh.id ? fresh : x);
      renderizarDetalhe(fresh);
      mostrarToast('Foto removida');
    }

    function abrirLightbox(url) {
      photoLightboxImg.src = url;
      photoLightbox.classList.add('open');
      photoLightbox.setAttribute('aria-hidden', 'false');
    }

    function fecharLightbox() {
      photoLightbox.classList.remove('open');
      photoLightbox.setAttribute('aria-hidden', 'true');
      photoLightboxImg.src = '';
    }

    async function carregar() {
      lista.innerHTML = skeletonCard(true) + skeletonCard(true) + skeletonCard(false);
      const res = await fetch('/api/filmes');
      filmes = await res.json();
      renderizar();
      aplicarRotaHash();
    }

    function renderizar() {
      const total = filmes.length;
      const assistidos = filmes.filter(f => f.assistido).length;
      stats.innerHTML = `${assistidos}/${total} assistidos`;

      const filtrados = filmes.filter(f => {
        if (filtro === 'pendentes') return !f.assistido;
        if (filtro === 'assistidos') return f.assistido;
        return true;
      });

      if (filtrados.length === 0) {
        const msgs = {
          todos: ['🍿', 'Lista vazia', 'Adicione filmes e séries\nque vocês querem assistir juntos.'],
          pendentes: ['✅', 'Tudo assistido!', 'Adicionem mais filmes\npara a lista.'],
          assistidos: ['🎬', 'Nenhum assistido ainda', 'Marquem os filmes\nconforme forem assistindo.'],
        };
        const [icon, title, sub] = msgs[filtro];
        lista.innerHTML = `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
        return;
      }

      const soAssistidos = filtro === 'assistidos';
      const podeOrdenar = filtro === 'pendentes';

      lista.innerHTML = filtrados.map(f => {
        const banner = f.backdrop_path
          ? `<div class="card-banner">
               <img src="${TMDB_IMG}/w500${f.backdrop_path}" loading="lazy" alt="${escapeHtml(f.titulo)}"
                 onload="this.classList.add('img-loaded'); this.closest('.card-banner').classList.add('banner-loaded')"
                 onerror="this.closest('.card-banner').style.display='none'">
               <div class="card-banner-fade"></div>
             </div>`
          : '';

        return `
        <div class="card ${f.assistido ? 'watched' : ''}" data-id="${f.id}">
          ${banner}
          <div class="card-main">
            ${podeOrdenar ? '<div class="drag-handle" onclick="event.stopPropagation()">⠿</div>' : '<div class="drag-handle" style="visibility:hidden" onclick="event.stopPropagation()">⠿</div>'}
            <button class="check-btn ${f.assistido ? 'checked' : ''}" ${soAssistidos ? 'disabled style="cursor:default;opacity:0.5"' : `onclick="event.stopPropagation(); toggleAssistido('${f.id}')"`}>
              <svg class="check-icon" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="1.5,6 4.5,9 10.5,3"/>
              </svg>
            </button>
            <div class="card-body">
              <div class="card-top">
                <div class="titulo">${escapeHtml(f.titulo)}</div>
                <div class="badges">
                  <span class="badge badge-${f.tipo}">${f.tipo === 'filme' ? '🎬' : '📺'} ${f.tipo}</span>
                </div>
              </div>
              ${f.nota ? `<div class="nota">${escapeHtml(f.nota)}</div>` : ''}
              ${!f.assistido && f.previsaoEm ? `<div class="previsao">🗓 Previsão: ${formatarDataLocal(f.previsaoEm)}</div>` : ''}
              <div class="card-footer">
                <div class="data">${f.assistido && f.assistidoEm ? '✅ ' + formatarData(f.assistidoEm) : '📅 ' + formatarData(f.adicionadoEm)}</div>
                ${soAssistidos ? '<span></span>' : `<div style="display:flex;gap:4px"><button class="edit-btn" onclick="event.stopPropagation(); abrirModalEdicao('${f.id}')">✏️</button><button class="delete-btn" onclick="event.stopPropagation(); deletar('${f.id}')">🗑</button></div>`}
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      initSortable(podeOrdenar);
    }

    function initSortable(podeOrdenar) {
      if (sortable) sortable.destroy();
      if (!podeOrdenar) { sortable = null; return; }
      sortable = Sortable.create(lista, {
        handle: '.drag-handle',
        animation: 150,
        ghostClass: 'sortable-ghost',
        chosenClass: 'sortable-chosen',
        onEnd: async () => {
          const visibleIds = [...lista.querySelectorAll('.card')].map(el => el.dataset.id);
          const visibleSet = new Set(visibleIds);

          const visibleOriginalIndices = filmes
            .map((f, i) => (visibleSet.has(f.id) ? i : -1))
            .filter(i => i !== -1);

          const newVisible = visibleIds.map(id => filmes.find(f => f.id === id));
          const result = [...filmes];
          visibleOriginalIndices.forEach((idx, i) => { result[idx] = newVisible[i]; });

          filmes = result;
          await fetch('/api/filmes/reorder', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids: filmes.map(f => f.id) }),
          });
        },
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatarData(iso) {
      return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function formatarDataLocal(yyyymmdd) {
      const [y, m, d] = yyyymmdd.split('-');
      return new Date(+y, +m - 1, +d).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    async function toggleAssistido(id, opts) {
      const fromDetail = opts && opts.fromDetail;
      const f = filmes.find(x => x.id === id);
      if (!f || (fromDetail && f.assistido)) return;
      const card = lista.querySelector(`[data-id="${id}"]`);
      const btn = card?.querySelector('.check-btn');
      const detailBtn = document.getElementById('detail-check-assistido');
      let detailPrevHtml = null;
      if (fromDetail && detailBtn) {
        detailPrevHtml = detailBtn.innerHTML;
        detailBtn.disabled = true;
        detailBtn.setAttribute('aria-busy', 'true');
        detailBtn.innerHTML = '<span class="detail-btn-spinner" aria-hidden="true"></span>A atualizar...';
      } else if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="check-spinner"></span>';
      }
      try {
        const res = await fetch(`/api/filmes/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assistido: !f.assistido }),
        });
        if (!res.ok) throw new Error('PATCH assistido');
        const updated = await res.json();
        filmes = filmes.map(x => x.id === id ? updated : x);
        if (detalheFilmeId === id) renderizarDetalhe(updated);
        renderizar();
        mostrarToast(updated.assistido ? '✅ Marcado como assistido!' : '↩️ Desmarcado');
      } catch {
        if (fromDetail && detailBtn) {
          detailBtn.disabled = false;
          detailBtn.removeAttribute('aria-busy');
          if (detailPrevHtml != null) detailBtn.innerHTML = detailPrevHtml;
        } else if (btn) {
          btn.disabled = false;
          btn.innerHTML = '<svg class="check-icon" viewBox="0 0 12 12" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1.5,6 4.5,9 10.5,3"/></svg>';
        }
      }
    }

    async function deletar(id) {
      const f = filmes.find(x => x.id === id);
      if (!confirm(`Remover "${f.titulo}" da lista?`)) return;
      await fetch(`/api/filmes/${id}`, { method: 'DELETE' });
      filmes = filmes.filter(x => x.id !== id);
      if (detalheFilmeId === id) location.hash = '';
      renderizar();
      mostrarToast('🗑 Removido da lista');
    }

    let editandoId = null;
    const overlayEdicao = document.getElementById('overlay-edicao');

    function abrirModalEdicao(id) {
      const f = filmes.find(x => x.id === id);
      if (!f || f.assistido) return;
      editandoId = id;
      document.getElementById('edit-titulo').value = f.titulo;
      document.getElementById('edit-nota').value = f.nota || '';
      document.getElementById('edit-previsao').value = f.previsaoEm || '';
      document.getElementById('edit-tipo-filme').classList.toggle('active', f.tipo === 'filme');
      document.getElementById('edit-tipo-serie').classList.toggle('active', f.tipo === 'serie');
      overlayEdicao.classList.add('open');
    }

    function fecharModalEdicao() {
      overlayEdicao.classList.remove('open');
      editandoId = null;
    }

    async function salvarEdicao() {
      const btnSalvar = document.getElementById('btn-salvar-edicao');
      btnSalvar.disabled = true;
      btnSalvar.innerHTML = '<span class="btn-spinner"></span>Salvando...';
      try {
        const res = await fetch(`/api/filmes/${editandoId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nota: document.getElementById('edit-nota').value.trim(),
            previsaoEm: document.getElementById('edit-previsao').value || null,
          }),
        });
        const updated = await res.json();
        filmes = filmes.map(x => x.id === editandoId ? updated : x);
        if (detalheFilmeId === editandoId) renderizarDetalhe(updated);
        fecharModalEdicao();
        renderizar();
        mostrarToast('✏️ Item atualizado!');
      } catch {
        mostrarToast('Erro ao salvar. Tente novamente.');
      } finally {
        btnSalvar.disabled = false;
        btnSalvar.innerHTML = 'Salvar';
      }
    }

    async function adicionar() {
      const titulo = inputTitulo.value.trim();
      if (!titulo) { inputTitulo.focus(); return; }
      const btnAdd = document.getElementById('btn-add');
      btnAdd.disabled = true;
      btnAdd.innerHTML = '<span class="btn-spinner"></span>Adicionando...';
      try {
        const previsaoEm = document.getElementById('input-previsao').value || null;
        const res = await fetch('/api/filmes', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            titulo,
            tipo: tipoSelecionado,
            nota: inputNota.value.trim(),
            previsaoEm,
            tmdb_id: tmdbSelecionado ? tmdbSelecionado.tmdb_id : null,
            poster_path: tmdbSelecionado ? tmdbSelecionado.poster_path : null,
            backdrop_path: tmdbSelecionado ? tmdbSelecionado.backdrop_path : null,
          }),
        });
        const novo = await res.json();
        filmes.unshift(novo);
        fecharModal();
        if (filtro === 'assistidos') filtro = 'todos';
        renderizar();
        mostrarToast('🎉 Adicionado à lista!');
      } catch {
        mostrarToast('Erro ao adicionar. Tente novamente.');
      } finally {
        btnAdd.disabled = false;
        btnAdd.innerHTML = 'Adicionar';
      }
    }

    function abrirModal() {
      overlay.classList.add('open');
      setTimeout(() => inputTitulo.focus(), 300);
    }

    function fecharModal() {
      overlay.classList.remove('open');
      inputTitulo.value = '';
      inputNota.value = '';
      document.getElementById('input-previsao').value = '';
      limparTmdb();
    }

    function limparTmdb() {
      tmdbSelecionado = null;
      tituloAntesDaSeleção = '';
      clearTimeout(searchTimer);
      elSuggestions.style.display = 'none';
      elSuggestions.innerHTML = '';
      elPreview.style.display = 'none';
      elSearching.style.display = 'none';
    }

    function mostrarToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // --- TMDB search ---

    inputTitulo.addEventListener('focus', () => {
      if (tmdbSelecionado) return;
      const q = inputTitulo.value.trim();
      if (q.length >= 2) {
        clearTimeout(searchTimer);
        elSearching.style.display = 'block';
        searchTimer = setTimeout(() => buscarTmdb(q), 200);
      }
    });

    inputTitulo.addEventListener('input', () => {
      if (tmdbSelecionado) {
        tmdbSelecionado = null;
        elPreview.style.display = 'none';
      }
      clearTimeout(searchTimer);
      const q = inputTitulo.value.trim();
      if (q.length < 2) {
        elSuggestions.style.display = 'none';
        elSearching.style.display = 'none';
        return;
      }
      elSearching.style.display = 'block';
      searchTimer = setTimeout(() => buscarTmdb(q), 420);
    });

    async function buscarTmdb(q) {
      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
        const results = await res.json();
        elSearching.style.display = 'none';
        mostrarSugestoes(results.filter(r => r.tipo === tipoSelecionado));
      } catch {
        elSearching.style.display = 'none';
        elSuggestions.style.display = 'none';
      }
    }

    function mostrarSugestoes(results) {
      if (!results.length) {
        elSuggestions.style.display = 'none';
        return;
      }
      elSuggestions.innerHTML = results.map((r, i) => {
        const poster = r.poster_path
          ? `<img class="tmdb-result-poster" src="${TMDB_IMG}/w92${r.poster_path}" loading="lazy" alt="" onerror="this.style.display='none'">`
          : `<div class="tmdb-result-poster-placeholder">${r.tipo === 'filme' ? '🎬' : '📺'}</div>`;
        const tipoLabel = r.tipo === 'filme' ? '🎬 Filme' : '📺 Série';
        const meta = r.ano ? `${tipoLabel} · ${r.ano}` : tipoLabel;
        return `<div class="tmdb-result" data-idx="${i}">
          ${poster}
          <div class="tmdb-result-info">
            <div class="tmdb-result-title">${escapeHtml(r.titulo)}</div>
            <div class="tmdb-result-meta">${meta}</div>
          </div>
        </div>`;
      }).join('');

      elSuggestions._results = results;
      elSuggestions.style.display = 'block';

      elSuggestions.querySelectorAll('.tmdb-result').forEach((el, i) => {
        el.addEventListener('click', () => selecionarTmdb(results[i]));
      });
    }

    function selecionarTmdb(result) {
      tituloAntesDaSeleção = inputTitulo.value;
      tmdbSelecionado = result;
      inputTitulo.value = result.titulo;

      // Seleciona o tipo correspondente
      overlay.querySelectorAll('.tipo-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tipo === result.tipo);
      });
      tipoSelecionado = result.tipo;

      elSuggestions.style.display = 'none';

      // Exibe preview
      const previewImg = document.getElementById('tmdb-preview-img');
      if (result.poster_path) {
        previewImg.onerror = () => { previewImg.style.display = 'none'; };
        previewImg.src = `${TMDB_IMG}/w154${result.poster_path}`;
        previewImg.style.display = 'block';
      } else {
        previewImg.style.display = 'none';
      }
      document.getElementById('tmdb-preview-title').textContent = result.titulo;
      const tipoLabel = result.tipo === 'filme' ? '🎬 Filme' : '📺 Série';
      document.getElementById('tmdb-preview-meta').textContent = result.ano ? `${tipoLabel} · ${result.ano}` : tipoLabel;
      elPreview.style.display = 'flex';
    }

    document.getElementById('tmdb-preview-clear').addEventListener('click', () => {
      limparTmdb();
      inputTitulo.value = tituloAntesDaSeleção;
      inputTitulo.focus();
      const q = tituloAntesDaSeleção.trim();
      if (q.length >= 2) {
        elSearching.style.display = 'block';
        searchTimer = setTimeout(() => buscarTmdb(q), 200);
      }
    });

    // Fecha sugestões ao clicar fora
    document.addEventListener('click', e => {
      if (!e.target.closest('#tmdb-suggestions') && e.target !== inputTitulo) {
        elSuggestions.style.display = 'none';
      }
    });

    // Tabs
    const tabsOrder = ['pendentes', 'todos', 'assistidos'];
    let tabTransitioning = false;

    function mudarTab(novoFiltro, direcao) {
      if (tabTransitioning || novoFiltro === filtro) return;
      const oldIdx = tabsOrder.indexOf(filtro);
      const newIdx = tabsOrder.indexOf(novoFiltro);
      const dir = direcao || (newIdx > oldIdx ? 'left' : 'right');

      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.filtro === novoFiltro);
      });
      filtro = novoFiltro;
      tabTransitioning = true;

      lista.style.cssText = `transition: opacity 0.14s ease, transform 0.14s ease; opacity: 0; transform: translateX(${dir === 'left' ? '-28px' : '28px'})`;

      setTimeout(() => {
        renderizar();
        lista.style.cssText = `transition: none; opacity: 0; transform: translateX(${dir === 'left' ? '28px' : '-28px'})`;

        requestAnimationFrame(() => requestAnimationFrame(() => {
          lista.style.cssText = `transition: opacity 0.2s ease, transform 0.2s ease; opacity: 1; transform: translateX(0)`;
          setTimeout(() => {
            lista.style.cssText = '';
            tabTransitioning = false;
          }, 200);
        }));
      }, 140);
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => mudarTab(tab.dataset.filtro));
    });

    // Swipe entre abas
    let swipeTouchStartX = null;
    document.addEventListener('touchstart', e => {
      swipeTouchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.addEventListener('touchend', e => {
      if (swipeTouchStartX === null) return;
      const diff = swipeTouchStartX - e.changedTouches[0].clientX;
      swipeTouchStartX = null;
      if (Math.abs(diff) < 50) return;
      const idx = tabsOrder.indexOf(filtro);
      if (diff > 0 && idx < tabsOrder.length - 1) mudarTab(tabsOrder[idx + 1], 'left');
      else if (diff < 0 && idx > 0) mudarTab(tabsOrder[idx - 1], 'right');
    }, { passive: true });

    // Tipo buttons (add modal)
    overlay.querySelectorAll('.tipo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.dataset.tipo === tipoSelecionado) return;
        overlay.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tipoSelecionado = btn.dataset.tipo;

        // Se havia seleção TMDB, limpa pois o tipo mudou
        if (tmdbSelecionado) {
          tmdbSelecionado = null;
          elPreview.style.display = 'none';
        }

        // Rebusca com o novo tipo se há título
        const q = inputTitulo.value.trim();
        if (q.length >= 2) {
          clearTimeout(searchTimer);
          elSearching.style.display = 'block';
          elSuggestions.style.display = 'none';
          searchTimer = setTimeout(() => buscarTmdb(q), 200);
        }
      });
    });

    // Tipo buttons (edit modal)
    document.getElementById('fab-btn').addEventListener('click', abrirModal);
    document.getElementById('btn-add').addEventListener('click', adicionar);
    document.getElementById('btn-cancel').addEventListener('click', fecharModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) fecharModal(); });

    document.getElementById('btn-salvar-edicao').addEventListener('click', salvarEdicao);
    document.getElementById('btn-cancelar-edicao').addEventListener('click', fecharModalEdicao);
    overlayEdicao.addEventListener('click', e => { if (e.target === overlayEdicao) fecharModalEdicao(); });

    inputTitulo.addEventListener('keydown', e => { if (e.key === 'Enter') adicionar(); });

    detailBack.addEventListener('click', () => { location.hash = ''; });

    detailBtnEdit.addEventListener('click', () => {
      if (detalheFilmeId) abrirModalEdicao(detalheFilmeId);
    });

    detailBtnDelete.addEventListener('click', () => {
      if (detalheFilmeId) deletar(detalheFilmeId);
    });

    detailInner.addEventListener('click', e => {
      if (e.target.closest('#detail-check-assistido')) {
        const cur = filmes.find(x => x.id === detalheFilmeId);
        if (detalheFilmeId && cur && !cur.assistido) toggleAssistido(detalheFilmeId, { fromDetail: true });
        return;
      }
      if (e.target.closest('#gallery-btn-camera')) {
        const b = document.getElementById('gallery-btn-camera');
        if (b && !b.disabled) inputFotoCamera.click();
        return;
      }
      if (e.target.closest('#gallery-btn-galeria')) {
        const b = document.getElementById('gallery-btn-galeria');
        if (b && !b.disabled) inputFotoGaleria.click();
        return;
      }
      const delBtn = e.target.closest('.gallery-item-delete');
      if (delBtn && delBtn.dataset.fotoId) {
        e.preventDefault();
        removerFoto(delBtn.dataset.fotoId);
        return;
      }
      const img = e.target.closest('.gallery-item img');
      if (img) abrirLightbox(img.src);
    });

    inputFotoCamera.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (file) enviarFotoFicheiro(file);
    });

    inputFotoGaleria.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (file) enviarFotoFicheiro(file);
    });

    photoLightboxClose.addEventListener('click', fecharLightbox);
    photoLightbox.addEventListener('click', e => {
      if (e.target === photoLightbox) fecharLightbox();
    });

    lista.addEventListener('click', e => {
      const card = e.target.closest('.card');
      if (!card) return;
      if (e.target.closest('.check-btn, .drag-handle, .edit-btn, .delete-btn')) return;
      const id = card.dataset.id;
      if (id) location.hash = '#/filme/' + id;
    });

    window.addEventListener('hashchange', aplicarRotaHash);

    carregar();
  </script>
</body>

</html>
